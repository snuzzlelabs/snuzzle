<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snuzzle Labs</title>

<style>

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,120,200,0.12), transparent 40%),
    radial-gradient(circle at 50% 60%, rgba(0,200,255,0.10), transparent 50%),
    #ffffff;
  color:#111;
  margin:0;
  padding:40px 20px;
}

.container{
  max-width:560px;
  margin:auto;
  text-align:center;
}

h1{
  font-size:34px;
  margin-bottom:20px;
  font-weight:700;
}

.cupcake{
  position:relative;
  margin:20px 0 10px 0;
}

.cupcake::before{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:260px;
  height:260px;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle, rgba(255,120,200,0.25), rgba(0,200,255,0.15), transparent 70%);
  filter:blur(40px);
  opacity:0.6;
  z-index:-1;
  animation:cupcakeGlow 6s ease-in-out infinite;
}

@keyframes cupcakeGlow{
  0%{opacity:0.5; transform:translate(-50%,-50%) scale(1);}
  50%{opacity:0.75; transform:translate(-50%,-50%) scale(1.05);}
  100%{opacity:0.5; transform:translate(-50%,-50%) scale(1);}
}

.cupcake img{
  max-width:170px;
  filter: drop-shadow(0 10px 18px rgba(0,0,0,0.15));
}

.sparkle{
  font-size:15px;
  color:#666;
  margin-bottom:24px;
}

.products{
  display:flex;
  flex-direction:column;
  gap:16px;
  text-align:left;
}

.card{
  background:#000;
  border:1px solid #111;
  border-radius:14px;
  padding:16px;
  text-decoration:none;
  color:#fff;
  display:flex;
  align-items:center;
  gap:18px;
  transition:all .18s ease;
}

.card:hover{
  border-color:#333;
  transform:translateY(-3px);
  box-shadow:0 10px 24px rgba(0,0,0,0.25);
}

.logo{
  width:64px;
  height:64px;
  flex-shrink:0;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:contain;
  transition:all .25s ease;
  filter:drop-shadow(0 0 6px rgba(255,255,255,0.3));
}

.card:hover .logo img{
  filter:
    drop-shadow(0 0 8px rgba(255,0,200,0.9))
    drop-shadow(0 0 12px rgba(0,200,255,0.8));
}

.card-title{
  font-size:19px;
  font-weight:700;
  margin-bottom:4px;
}

.card-desc{
  font-size:14px;
  color:#bbb;
}

.footer{
  margin-top:50px;
  font-size:12px;
  color:#bbb;
  opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<h1>Snuzzle Labs</h1>

<div class="cupcake">
<img src="https://www.snuzzlelabs.com/cupcaketran.png">
</div>

<div class="sparkle">
Making sparkle muffins. Tiny software experiments.
</div>

<div class="products" id="products"></div>

<div class="footer">
© 2026–2028 Snuzzle Labs
</div>

</div>

<script>

const apps = [

{
name: "Helprz",
desc: "Business documents and contracts, sorted.",
logo: "https://www.snuzzlelabs.com/helprzblk.png",
url: "https://helprz.com"
},

{
name: "BigWavez",
desc: "See where the biggest waves in the world are right now.",
logo: "https://www.snuzzlelabs.com/bigwavezlogo.png",
url: "https://bigwavez.com"
}

];

const container = document.getElementById("products");

apps.forEach(app => {

const card = document.createElement("a");
card.className = "card";
card.href = app.url;

card.innerHTML = `
<div class="logo">
<img src="${app.logo}">
</div>

<div>
<div class="card-title">${app.name}</div>
<div class="card-desc">${app.desc}</div>
</div>
`;

container.appendChild(card);

});

</script>

</body>
</html>
