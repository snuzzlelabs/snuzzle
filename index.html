<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snuzzle</title>

<style>

body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #FE7D98;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  text-align: center;
}

/* Title */

h1 {
  font-size: 56px;
  letter-spacing: 2px;
  margin-bottom: 8px;
  color: white;
}

/* Tagline */

.tagline {
  color: rgba(255,255,255,0.85);
  margin-bottom: 50px;
  font-size: 18px;
}

/* Mixer container */

.mixer-container {
  position: relative;
}

/* Mixer image */

.mixer {
  width: 380px;
  animation: float 4s ease-in-out infinite;
  filter: drop-shadow(0 25px 50px rgba(0,0,0,0.15));
}

/* Floating motion */

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}

/* Subtle whisk spin illusion */

.mixer::after {
  content: "";
  position: absolute;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  left: 50%;
  top: 65%;
  transform: translate(-50%, -50%);
  background: radial-gradient(
    circle,
    rgba(255,255,255,0.35) 0%,
    rgba(255,255,255,0.15) 40%,
    rgba(255,255,255,0) 70%
  );
  animation: whiskSpin 2s linear infinite;
}

@keyframes whiskSpin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* Sparkles */

.sparkle {
  position: absolute;
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(255,255,255,0.9);
  animation: sparkle 2.5s infinite ease-in-out;
}

.sparkle:nth-child(2) {
  top: 10%;
  left: 15%;
  animation-delay: 0.5s;
}

.sparkle:nth-child(3) {
  top: 70%;
  left: 85%;
  animation-delay: 1s;
}

.sparkle:nth-child(4) {
  top: 25%;
  left: 75%;
  animation-delay: 1.5s;
}

.sparkle:nth-child(5) {
  top: 80%;
  left: 25%;
  animation-delay: 2s;
}

@keyframes sparkle {
  0% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0; transform: scale(0.5); }
}

</style>
</head>

<body>

<h1>Snuzzle</h1>

<p class="tagline">Something sweet is being whipped up...</p>

<div class="mixer-container">

<img src="/images/mixer.png" alt="Pink mixer whipping cream" class="mixer">

<div class="sparkle"></div>
<div class="sparkle"></div>
<div class="sparkle"></div>
<div class="sparkle"></div>

</div>

</body>
</html>
