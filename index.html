<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snuzzle</title>

<style>

body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  background: #ffffff;

  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  text-align: center;
}

/* Title */

h1 {
  font-size: 72px;
  color: #000;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

/* Tagline */

.tagline {
  font-size: 20px;
  color: #555;
  margin-bottom: 60px;
}

/* Mixer container */

.mixer-container {
  position: relative;
}

/* Soft pink glow behind mixer */

.mixer-container::before {
  content: "";
  position: absolute;
  width: 460px;
  height: 460px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);

  background: radial-gradient(circle,
    rgba(254,125,152,0.25) 0%,
    rgba(254,125,152,0) 70%
  );

  filter: blur(40px);
  z-index: -1;
}

/* Mixer image */

.mixer {
  width: 420px;
  animation: float 4s ease-in-out infinite;
  filter: drop-shadow(0 25px 40px rgba(0,0,0,0.12));
}

/* Floating animation */

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}

/* Whipping illusion */

.mixer-container::after {
  content: "";
  position: absolute;

  width: 120px;
  height: 120px;

  border-radius: 50%;

  left: 50%;
  top: 66%;

  transform: translate(-50%, -50%);

  background: radial-gradient(
    circle,
    rgba(255,255,255,0.6) 0%,
    rgba(255,255,255,0.2) 40%,
    rgba(255,255,255,0) 70%
  );

  animation: whiskSpin 2s linear infinite;
}

@keyframes whiskSpin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* Sparkles */

.sparkle {
  position: absolute;
  width: 8px;
  height: 8px;
  background: #FE7D98;
  border-radius: 50%;
  box-shadow: 0 0 12px rgba(254,125,152,0.9);
  animation: sparkle 2.5s infinite ease-in-out;
}

.sparkle:nth-child(2) {
  top: 10%;
  left: 10%;
  animation-delay: 0.5s;
}

.sparkle:nth-child(3) {
  top: 70%;
  left: 90%;
  animation-delay: 1s;
}

.sparkle:nth-child(4) {
  top: 25%;
  left: 80%;
  animation-delay: 1.5s;
}

.sparkle:nth-child(5) {
  top: 80%;
  left: 20%;
  animation-delay: 2s;
}

@keyframes sparkle {
  0% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.3); }
  100% { opacity: 0; transform: scale(0.5); }
}

/* Footer */

.footer {
  position: absolute;
  bottom: 25px;
  font-size: 14px;
  color: #999;
}

/* Mobile */

@media (max-width: 600px) {

  h1 {
    font-size: 52px;
  }

  .mixer {
    width: 300px;
  }

  .tagline {
    font-size: 18px;
  }

}

</style>
</head>

<body>

<h1>Snuzzle</h1>

<p class="tagline">Something sweet is being whipped up...</p>

<div class="mixer-container">

<img src="mixer.png" alt="Pink mixer whipping cream" class="mixer">

<div class="sparkle"></div>
<div class="sparkle"></div>
<div class="sparkle"></div>
<div class="sparkle"></div>

</div>

<p class="footer">© Snuzzle</p>

</body>
</html>
