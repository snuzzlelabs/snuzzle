<!DOCTYPE html>
<html lang="en">
<head>

<title>snuzzle</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  margin:0;
  background:white;
  font-family:Arial, Helvetica, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  opacity:0.2;
}

.overlay{
  position:relative;
  text-align:center;
  color:black;
  letter-spacing:2px;
}

h1{
  font-size:48px;
  margin:0;
}

p{
  margin-top:10px;
  font-size:16px;
}

</style>
</head>

<body>

<video autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay">
<h1>snuzzle</h1>
<p>coming soon</p>
</div>

</body>
</html>
