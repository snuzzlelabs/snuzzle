<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snuzzle</title>

<style>

body {
  margin: 0;
  height: 100vh;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  background: #ffffff;

  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
  text-align: center;
}

/* Heading */

h1 {
  font-size: 64px;
  font-weight: 600;
  letter-spacing: -1px;
  color: #111;
  margin-bottom: 24px;
}

/* Image */

img {
  width: 360px;
  height: auto;
  margin-bottom: 32px;
}

/* Tagline */

.tagline {
  font-size: 18px;
  color: #666;
  margin-bottom: 60px;
}

/* Footer */

.footer {
  position: absolute;
  bottom: 24px;
  font-size: 14px;
  color: #999;
}

/* Mobile */

@media (max-width: 600px) {

  h1 {
    font-size: 46px;
  }

  img {
    width: 260px;
  }

  .tagline {
    font-size: 16px;
  }

}

</style>
</head>

<body>

<h1>Snuzzle</h1>

<img src="mixer.png" alt="Pink mixer whipping cream">

<p class="tagline">a sparkle muffin is coming soon</p>

<p class="footer">© 2026 Snuzzle</p>

</body>
</html>
